name: Test
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    env:
      ROS_DISTRO: ${{ matrix.ros_distro }}
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      # Ubuntu 26.04 ships CMake 4.x, which hard-errors on dependencies that
      # declare cmake_minimum_required(VERSION < 3.5) (e.g. the zlib bundled by
      # ortools_vendor's OR-Tools). This lets CMake 4 accept those old minimums;
      # it propagates into nested FetchContent/ExternalProject sub-builds too.
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    container:
      image: ghcr.io/ros-tooling/setup-ros-docker/setup-ros-docker-ubuntu-resolute-ros-lyrical-ros-base:master
    strategy:
      fail-fast: false
      matrix:
          ros_distro: [lyrical]
    steps:
    - uses: actions/checkout@v4
    - name: Install Cyclone DDS
      run: sudo apt install ros-${{ matrix.ros_distro }}-rmw-cyclonedds-cpp -y
    # nav2 (navigation2 main) and Fields2Cover are built from source via
    # deps.repos. Rolling left Ubuntu Noble for Lyrical/Ubuntu 26.04 (resolute),
    # so we run on the Lyrical image where the apt repo is consistent and rosdep
    # resolves all source-build dependencies (backward_ros, geographic_msgs, the
    # BT stack, ...) automatically -- no manual apt step needed.
    - name: Build and run tests
      id: action-ros-ci
      uses: ros-tooling/action-ros-ci@v0.4
      with:
        package-name: nav2_bt_navigator nav2_behavior_tree opennav_coverage opennav_coverage_bt opennav_coverage_demo opennav_coverage_msgs opennav_coverage_navigator opennav_row_coverage
        import-token: ${{ secrets.GITHUB_TOKEN }}
        target-ros2-distro: ${{ matrix.ros_distro }}
        vcs-repo-file-url: "${{ github.workspace }}/.github/deps.repos"
    - uses: actions/upload-artifact@v4
      with:
        name: colcon-logs
        path: ros_ws/log
